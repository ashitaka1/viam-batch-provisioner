set timeout=5
set default=autoinstall

# Guard: if this MAC has been provisioned, exit to boot from disk.
# The pxe-watcher writes grub/provisioned/<MAC>.cfg containing "exit"
# when a machine is assigned. source silently fails if file is missing.
source grub/provisioned/${net_default_mac}.cfg

menuentry "Ubuntu Autoinstall" --id=autoinstall {
    linux /vmlinuz ip=dhcp url=http://${net_default_server}:8234/ubuntu/ubuntu-24.04.4-live-server-amd64.iso autoinstall ds=nocloud-net\;s=http://${net_default_server}:8234/autoinstall/ nomodeset vga=791 quiet ---
    initrd /initrd
}
